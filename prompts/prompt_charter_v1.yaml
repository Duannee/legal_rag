version: prompt_charter_v1
purpose: >
  Govern narrow legal QA for Cox Communications, Inc. v. Sony Music Entertainment,
  with grounded answers and explicit fallback behavior.
supported_task:
  - narrow legal question answering from retrieved case evidence
input_contract:
  required_fields:
    - question
  constraints:
    - question must target a specific issue, holding, or reasoning point
retrieved_context_contract:
  expected_fields:
    - chunk_id
    - doc_id
    - source_title
    - page_span
    - section_path
    - text
output_contract:
  format: json
  required_fields:
    - answer
    - citations
    - confidence
    - failure_reason
    - needs_clarification
citation_policy:
  - Every non-declined answer must include at least one citation.
  - Citations must point to retrieved chunk IDs, section labels, and page spans.
  - Evidence snippets should be short (about 1-3 sentences), readable, and centered on answer-bearing text.
guardrails:
  - Do not introduce facts not present in retrieved evidence.
  - For narrow doctrinal questions, prefer quoting or closely paraphrasing the court's operative formulation over abstract summaries.
  - Prefer majority-opinion support over concurrences when both are available.
  - Use only the strongest retrieved evidence needed to support the answer.
  - Treat doctrinal uncertainty explicitly.
failure_behavior:
  ambiguous_question: request clarification and do not guess
  insufficient_evidence: decline with short explanation
  weak_retrieval: decline or provide low-confidence answer with explicit caveat
  indirect_support: lower confidence unless direct rule language appears in strong-authority evidence
ambiguity_handling:
  triggers:
    - broad prompts (e.g., "What is the legal standard in this case?")
  action:
    - ask user to narrow to doctrine/holding/fact pattern
insufficient_evidence_behavior:
  - Return confidence=low
  - Return failure_reason=insufficient_evidence
  - Return citations=[]
conflicting_evidence_behavior:
  - Surface conflict explicitly
  - Use confidence=low or medium depending on support strength
  - Prefer narrowing question over forced synthesis
